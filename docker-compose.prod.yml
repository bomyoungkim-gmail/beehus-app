# Production Docker Compose Override
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  # Disable the development frontend in production runs
  frontend:
    profiles:
      - dev-only

  # Dedicated production frontend (nginx + static dist)
  frontend-prod:
    build:
      context: ./beehus-web
      dockerfile: Dockerfile.prod
    container_name: beehus-app-frontend-prod
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      app-console:
        condition: service_started
    networks:
      - scrape-net
    command: ["nginx", "-g", "daemon off;"]

  # Production-optimized worker
  celery-worker:
    shm_size: 1g
