# Beehus - Host Nginx Reverse Proxy
# Copy to /etc/nginx/sites-available/beehus and symlink to sites-enabled
# After certbot, SSL blocks will be added automatically

# Frontend (HTTP -> upgraded to HTTPS by certbot)
server {
    listen 80;
    server_name beehus.placestecnologia.com.br;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# API (HTTP -> upgraded to HTTPS by certbot)
server {
    listen 80;
    server_name api.beehus.placestecnologia.com.br;

    client_max_body_size 50M;

    # API requests
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }
}

# VNC celery-worker (JP Morgan / Local Evasion)
# Docker: host 17901 -> container 6901 (NoVNC)
server {
    listen 7901 ssl;
    server_name beehus.placestecnologia.com.br;
    ssl_certificate /etc/letsencrypt/live/beehus.placestecnologia.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/beehus.placestecnologia.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    location / {
        proxy_pass http://127.0.0.1:17901/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
        proxy_hide_header X-Frame-Options;
    }
}

