services:
  db:
    image: postgres:15
    volumes:
      # Persist PostgreSQL data - pode alterar o caminho conforme necessário
      - ./data/db:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "15672:15672"
      - "5672:5672"

  web:
    build: .
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    restart: always
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  celery:
    build: .
    command: celery -A beehus_app worker -l info
    restart: always
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  celery-beat:
    build: .
    command: >
      sh -c "sleep 20 && 
      celery -A beehus_app beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler"
    restart: always
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      web:
        condition: service_started
